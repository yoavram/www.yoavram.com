{% extends "layout.html" %}
{% block title %}{{ this.title }}{% endblock %}
{% block body %}
  <div class="row">
    <div class="col-sm-12">
      <h1>{{ this.title }}</h1>
      <div id="pub-filter-bar" style="margin: 10px 0 20px 0;">
        <span class="small text-muted"><strong>Filter by topic:</strong></span>
        <button class="btn btn-xs btn-default pub-filter-btn active" data-tag="all">All</button>
        {% for tag in ['ecology', 'evolution', 'culture', 'epidemiology', 'anthropology', 'stats', 'AI', 'ML', 'math'] %}
        <button class="btn btn-xs btn-default pub-filter-btn" data-tag="{{ tag }}">{{ tag }}</button>
        {% endfor %}
      </div>
      <div id="pub-list">{{ this.body }}</div>
    </div>
  </div>
  <script>
    $(function () {
      var $items = $('#pub-list ol li');
      var $btns = $('.pub-filter-btn');
      var activeTag = null;

      function applyFilter() {
        $items.each(function () {
          var $li = $(this);
          if (!activeTag) {
            $li.show();
            return;
          }
          var tags = $li.find('.pub-tag').map(function () {
            return $(this).data('tag');
          }).get();
          $li.toggle($.inArray(activeTag, tags) !== -1);
        });
      }

      $btns.on('click', function () {
        $btns.removeClass('active');
        $(this).addClass('active');
        activeTag = $(this).data('tag') === 'all' ? null : $(this).data('tag');
        applyFilter();
      });
    });
  </script>
{% endblock %}
